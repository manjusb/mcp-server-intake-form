name: "MCP Service Request"
description: "Request the AI Hub team to build, deploy, or operate an MCP server. LLM gateway access is a prerequisite - see the first question."
title: "[MCP Request] <brief description of the request>"
labels:
  - "type:onboarding"
  - "request:mcp-onboarding"
  - "component:mcp-server"
  - "gateway:truefoundry"
  - "area:mcp-platform"
  - "awaiting-governance-approval"
  - "status:yet-to-start"
  - "review:security"
  - "review:architecture"
  - "priority:p2-normal"
assignees:
  - Mackr
body:
  - type: markdown
    attributes:
      value: |
        # AI Hub - MCP Service Intake Form

        This form captures everything the AI Hub team needs to build, deploy, and operate
        an MCP server for you on **TrueFoundry**.

  - type: markdown
    attributes:
      value: |
        ##  Prerequisite Check (LLM access is required before MCP)

        > **IMPORTANT:** LLM gateway access is a **MANDATORY prerequisite** for any MCP server.
        >
        > **Correct order:** LLM Intake Form -> LLM access approved -> This MCP form
        >
        > LLM Intake Form: **https://git.client.com/ai-hub/llm-intake**
        >
        > If your LLM access is not yet approved, please **STOP**, complete the LLM Intake Form
        > first, wait for approval, then return to this MCP form.

  - type: dropdown
    id: llm_access_status
    attributes:
      label: "Has your LLM gateway access already been approved? *"
      description: "If not approved yet, do not continue with this form - complete the LLM Intake Form first."
      options:
        - "Yes - approved"
        - "No - not yet requested"
        - "No - request submitted but pending"
    validations:
      required: true

  - type: input
    id: llm_ticket_reference
    attributes:
      label: "LLM Intake Reference"
      description: "If Yes - approved, provide the LLM Intake ticket ID or approval reference."
      placeholder: "LLM-2401 or approval email dated 2026-04-12"

  - type: markdown
    attributes:
      value: "---"

  # ================================================================
  # PART 1 - BUSINESS & CONTEXT (REQUIRED AT INTAKE)
  # ================================================================
  - type: markdown
    attributes:
      value: |
        # PART 1 - Business & Context
        *Required at intake.*

  # -- Section 1 - Requester Information ----------------------------
  - type: markdown
    attributes:
      value: "## 1. Requester Information"

  - type: input
    id: requester_name
    attributes:
      label: "Full Name"
      description: "Your full name as it appears in HR systems."
      placeholder: "John River"
    validations:
      required: true

  - type: input
    id: requester_email
    attributes:
      label: "Work Email"
      description: "All notifications will be sent here."
      placeholder: "john.river@email.com"
    validations:
      required: true

  - type: input
    id: requester_team
    attributes:
      label: "Team / Department"
      description: "The team funding this work."
      placeholder: "Sales Operations"
    validations:
      required: true

  - type: input
    id: requester_manager
    attributes:
      label: "Manager"
      description: "Required for cost-center approval."
      placeholder: "Robert Chen"
    validations:
      required: true

  - type: input
    id: date_submitted
    attributes:
      label: "Date Submitted"
      description: "Today's date. Format: YYYY-MM-DD."
      placeholder: "YYYY-MM-DD"

  # -- Section 2 - Request Details ----------------------------------
  - type: markdown
    attributes:
      value: "## 2. Request Details"

  - type: dropdown
    id: request_type
    attributes:
      label: "Request Type"
      description: "What kind of work are you requesting?"
      options:
        - "New build"
        - "Modification to existing server"
        - "Decommission"
        - "Consultation only"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "If unsure, pick Medium. The AI Hub team will confirm during triage."
      options:
        - "Low"
        - "Medium"
        - "High"
        - "Critical"
      default: 1
    validations:
      required: true

  - type: input
    id: target_go_live
    attributes:
      label: "Target Go-Live Date"
      description: "Realistic date, not aspirational. Use YYYY-MM-DD format."
      placeholder: "2026-07-15"
    validations:
      required: true

  - type: textarea
    id: urgency_justification
    attributes:
      label: "Urgency Justification"
      description: "Required only if Priority is High or Critical. What breaks if this slips?"
      placeholder: |
        e.g. Quarter-end deadline in 60 days; sales team can't quote without this
        integration in place. Manual workaround costs ~40 rep-hours per week.

  # -- Section 3 - Business Context ---------------------------------
  - type: markdown
    attributes:
      value: "## 3. Business Context"

  - type: textarea
    id: problem_statement
    attributes:
      label: "Problem Statement"
      description: "What problem are we solving? Keep it to 2-3 sentences."
      placeholder: |
        e.g. Sales reps spend 20+ minutes per call digging through Salesforce for
        opportunity history, contacts, and recent activity. We want Claude to surface
        this information on demand so reps spend more time selling and less time searching.
    validations:
      required: true

  - type: textarea
    id: business_outcome
    attributes:
      label: "Expected Business Outcome"
      description: "Time saved, revenue, risk reduced, etc. Be specific and measurable."
      placeholder: |
        e.g. Save ~30 min/rep/day. Estimated 5,000 hours/year recovered across the
        250-person sales org. Target: 15% increase in calls per rep per week within
        90 days of launch.
    validations:
      required: true

  - type: textarea
    id: target_users
    attributes:
      label: "Target Users"
      description: "Who will use it? Include team size and roles."
      placeholder: |
        e.g. Sales reps and managers - approximately 250 people across NA and EMEA.
        Pilot group: 10 reps in the West Region during weeks 1-2.
    validations:
      required: true

  - type: textarea
    id: definition_of_done
    attributes:
      label: "Definition of Done"
      description: "Measurable success criteria. How will we know this is finished?"
      placeholder: |
        e.g. Reps can ask Claude about any opportunity by name or ID and get account
        info, last 5 activities, open tasks, and key contacts within 5 seconds.
        95% of test queries return correct results in UAT.
    validations:
      required: true

  # -- Section 4 - Technical Scope (high-level) ---------------------
  - type: markdown
    attributes:
      value: |
        ## 4. Technical Scope (high-level)
        *Just the high-level picture here. Detailed architecture is in Part 2.*

  - type: textarea
    id: systems_to_connect
    attributes:
      label: "What downstream system the MCP server is connecting to?"
      description: "List the systems the MCP server needs to access."
      placeholder: |
        e.g.
        - Salesforce (Sales Cloud) - primary
        - Internal Customer Health API (read-only)
        - Snowflake data warehouse (account_summary view)
    validations:
      required: true

  - type: textarea
    id: key_use_cases
    attributes:
      label: "Key Actions / Use Cases"
      description: "List the specific actions the AI should perform."
      placeholder: |
        e.g.
        1. Look up opportunity by name or ID
        2. List recent activities on an account
        3. Find primary contact for an account
        4. Show open tasks assigned to current rep
        5. Summarize account health (open opps + activity + tickets)
    validations:
      required: true

  - type: dropdown
    id: ai_clients
    attributes:
      label: "AI Clients"
      description: "Which AI clients will use this server? Hold Ctrl/Cmd for multiple."
      multiple: true
      options:
        - "Claude Desktop"
        - "Claude Code"
        - "Claude in Chrome"
        - "Copilot Studio"
        - "Custom internal app"
        - "Other (specify in notes)"
    validations:
      required: true

  # -- Section 5 - Data & Security ----------------------------------
  - type: markdown
    attributes:
      value: |
        ## 5. Data & Security
        *Restricted data, PII, or write actions trigger automatic security and privacy review.*

  - type: dropdown
    id: data_sensitivity
    attributes:
      label: "Data sensitivity of the downstream system"
      description: "Use the org's data-classification standard."
      options:
        - "Public"
        - "Internal"
        - "Confidential"
        - "Other (specify in notes)"
    validations:
      required: true

  - type: dropdown
    id: contains_pii
    attributes:
      label: "Contains PII?"
      description: "Any personally identifiable information? Triggers privacy review if Yes."
      options:
        - "Yes"
        - "No"
        - "Unsure"
    validations:
      required: true

  - type: dropdown
    id: write_actions
    attributes:
      label: "Write Actions?"
      description: "Will the MCP server modify data in source systems? Triggers system-owner approval if Yes."
      options:
        - "Yes"
        - "No"
        - "Unsure - Will decide later"
    validations:
      required: true

  - type: dropdown
    id: auth_method
    attributes:
      label: "Authentication Method"
      description: "Preferred auth method. AI Hub will confirm feasibility on TrueFoundry."
      options:
        - "PAT"
        - "OAuth 2.0"
        - "API Key"
        - "JWT"
        - "Other (specify in notes)"
    validations:
      required: true

  - type: textarea
    id: access_scope
    attributes:
      label: "Access Scope"
      description: "Who should have access and under what conditions?"
      placeholder: |
        e.g. All Sales Cloud users with existing Salesforce access. Same row-level
        permissions enforced via user identity passthrough. No service-to-service
        access for end users.
    validations:
      required: true

  # -- Section 6 - Ownership & Operations ---------------------------
  - type: markdown
    attributes:
      value: "## 6. Ownership & Operations"

  - type: input
    id: business_owner
    attributes:
      label: "Business Owner"
      description: "Signs off on requirements and changes."
      placeholder: "Robert Chen (VP Sales Ops)"
    validations:
      required: true

  - type: input
    id: technical_poc
    attributes:
      label: "Technical POC"
      description: "Day-to-day technical contact on the requester side."
      placeholder: "Priya Sharma (Salesforce Admin Lead)"
    validations:
      required: true

  - type: input
    id: decision_maker
    attributes:
      label: "Decision-Maker for Trade-offs"
      description: "Single person who can decide when scope, time, and budget conflict."
      placeholder: "Robert Chen - single point of contact for trade-off calls"
    validations:
      required: true

  # ================================================================
  # PART 2 - TECHNICAL DEEP DIVE (OPTIONAL AT INTAKE)
  # ================================================================
  - type: markdown
    attributes:
      value: |
        ---
        # PART 2 - Technical Deep Dive
        *These fields are usually completed during scoping. If you don't know an answer
        yet, leave the field blank - we'll work through it together in the scoping session.*

  # -- Section 7 - MCP Architecture ---------------------------------
  - type: markdown
    attributes:
      value: "## 7. MCP Architecture"

  - type: dropdown
    id: mcp_primitives
    attributes:
      label: "MCP Primitives Needed"
      description: "Which MCP primitives does this server need to expose? Select all that apply."
      multiple: true
      options:
        - "Tools (functions the AI can call)"
        - "Resources (data the AI can read)"
        - "Prompts (reusable templates)"
        - "Sampling (server-initiated AI calls)"

  - type: dropdown
    id: transport_type
    attributes:
      label: "Transport Type"
      description: "How will AI clients connect to this MCP server? TrueFoundry supports Streamable HTTP; specify in notes if another transport is required."
      options:
        - "Streamable HTTP (remote, newer spec)"
        - "SSE (deprecated)"
        - "stdio (local only)"
        - "Other (specify in notes)"

  - type: dropdown
    id: hosting_model
    attributes:
      label: "Hosting Model"
      description: "Where will the MCP server run? Provide details in notes for anything not listed."
      options:
        - "Client Azure"
        - "Client AWS"
        - "Client GCP"
        - "SaaS hosted"
        - "Other (specify in notes)"

  # -- Section 8 - Tools & Behavior --------------------------------
  - type: markdown
    attributes:
      value: |
        ## 8. Tools & Behavior
        *Tool descriptions drive how the AI decides when to call each tool. Be precise.*

  - type: textarea
    id: proposed_tools
    attributes:
      label: "Proposed Tools - Names and Descriptions"
      description: "List each tool with a one-line description of what it does. Use snake_case for names."
      placeholder: |
        e.g.
        search_opportunities - Find opportunities by name, account, owner, or stage.
            Returns up to 20 matches with key fields.
        get_opportunity_detail - Get the full record for a single opportunity by ID,
            including custom fields.
        list_recent_activities - Last N activities (calls, emails, meetings) on an
            account. Default N=5.
        get_account_health - Summarize open opportunities, recent activity, support
            tickets, and renewal status for an account.
      render: text

  # -- Section 9 - Secrets & Auth ----------------------------------
  - type: markdown
    attributes:
      value: "## 9. Secrets & Auth"

  - type: dropdown
    id: secrets_management
    attributes:
      label: "Secrets management system"
      description: "Where will the MCP server's credentials (API keys, OAuth client secrets) be stored and managed?"
      options:
        - "HashiCorp Vault"
        - "AWS Secrets Manager"
        - "Azure Key Vault"
        - "GCP Secret Manager"
        - "TrueFoundry secrets"
        - "Other (specify in notes)"
        - "TBD - recommend best fit"

  - type: input
    id: secrets_admin
    attributes:
      label: "TrueFoundry secret group admin"
      description: "Who should be the admin for the TrueFoundry secret group for this MCP server?"
      placeholder: "Priya Sharma (priya.sharma@company.com)"

  - type: dropdown
    id: token_rotation
    attributes:
      label: "Token Rotation Cadence"
      description: "How often should credentials be rotated or refreshed?"
      options:
        - "30 days"
        - "60 days"
        - "90 days"
        - "180 days"
        - "As needed / on compromise"
        - "Other (specify in notes)"

  - type: textarea
    id: service_account_details
    attributes:
      label: "Service Account Details"
      description: "If using a service account, describe its scope and permissions."
      placeholder: |
        e.g. Dedicated Salesforce service account: ai-hub-mcp@company.com.
        Read-only profile scoped to Opportunity, Account, Contact, and Task objects.

  # -- Section 10 - Environments & Testing --------------------------
  - type: markdown
    attributes:
      value: "## 10. Environments & Testing"

  - type: dropdown
    id: staging_env
    attributes:
      label: "Non-production environment availability"
      description: "Is there a dev, stage, or UAT environment available for the downstream system this MCP server will connect to?"
      options:
        - "Yes - already exists"
        - "No - can provision one"
        - "No - must build against prod (read-only)"
        - "Unknown"

  - type: textarea
    id: environment_details
    attributes:
      label: "Environment Details and URL"
      description: "Share the url of MCP server "
      placeholder: |
        e.g. Salesforce dev: https://acme-uat.dev.my.salesforce.com/mcp/

  # -- Section 11 - Risks & Open Questions --------------------------
  - type: textarea
    id: open_questions
    attributes:
      label: "Open Questions for AI Hub"
      description: "Questions you'd like the AI Hub team to address during scoping."
      placeholder: |
        e.g.
        - Can we get a shared connection pool to stay under the SF API limit?
        - Is there a pattern for response caching that's already approved?
        - What's the recommended TrueFoundry deployment template for HTTP/SSE?

  # ================================================================
  # ACKNOWLEDGEMENTS
  # ================================================================
  - type: markdown
    attributes:
      value: |
        ---
        ## Acknowledgements

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: "Before submitting, please confirm"
      options:
        - label: "LLM gateway access is already approved (or I will not proceed with this MCP form until it is)."
          required: true
        - label: "Manager is aware of this request and supports it."
          required: true
        - label: "I am authorized to commit my team's cost center to this work."
          required: true
        - label: "I understand Part 2 may be completed during scoping if I don't have all the answers now."
          required: true
